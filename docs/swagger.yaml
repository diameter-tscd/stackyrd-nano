      description: Create a new order in a specific tenant's database
      parameters:
      - description: Tenant identifier
        in: path
        name: tenant
        required: true
        type: string
      - description: Order data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/modules.MultiTenantOrder'
      produces:
      - application/json
      responses:
        "201":
          description: Order created in tenant database
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Invalid order data
          schema:
