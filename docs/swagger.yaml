      - orders
    put:
      consumes:
      - application/json
      description: Update an order in a specific tenant's database
      parameters:
      - description: Tenant identifier
        in: path
        name: tenant
        required: true
        type: string
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      - description: Order update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/modules.MultiTenantOrder'
      produces:
      - application/json
