      name:
        type: string
      password:
        type: string
      readOnly:
        type: boolean
      secureJsonData:
        additionalProperties: true
        type: object
      type:
        type: string
      uid:
        type: string
      url:
        type: string
      user:
        type: string
    type: object
  infrastructure.GrafanaDatasource:
    properties:
      type:
        type: string
      uid:
        type: string
    type: object
  infrastructure.GrafanaFieldConfig:
    properties:
      defaults:
