      - orders
    get:
      consumes:
      - application/json
      description: Retrieve a specific order from a tenant's database
      parameters:
      - description: Tenant identifier
        in: path
        name: tenant
        required: true
        type: string
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Order retrieved from tenant database
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Invalid order ID
          schema:
            $ref: '#/definitions/response.Response'
        "404":
