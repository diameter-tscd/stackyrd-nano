  version: "1.0"
paths:
  /cache/{key}:
    get:
      consumes:
      - application/json
      description: Retrieve a cached value by its key
      parameters:
      - description: Cache key
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Key not found or expired
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get cached value by key
      tags:
      - cache
    post:
      consumes:
      - application/json
      description: Store a value in the cache with optional TTL
      parameters:
      - description: Cache key
        in: path
        name: key
        required: true
        type: string
      - description: Cache request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/modules.CacheRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Cached successfully
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Invalid body
          schema:
            $ref: '#/definitions/response.Response'
      summary: Set cached value
      tags:
      - cache
  /grafana/annotations:
    post:
      consumes:
      - application/json
      description: Create a new Grafana annotation
      parameters:
      - description: Annotation data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/infrastructure.GrafanaAnnotation'
      produces:
      - application/json
      responses:
        "201":
          description: Annotation created successfully
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Invalid annotation data
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Failed to create annotation
          schema:
            $ref: '#/definitions/response.Response'
      summary: Create Grafana annotation
      tags:
      - grafana
  /grafana/dashboards:
    get:
      consumes:
      - application/json
      description: List all Grafana dashboards with pagination
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 50
        description: Items per page
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Dashboards retrieved successfully
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Failed to list dashboards
          schema:
            $ref: '#/definitions/response.Response'
      summary: List Grafana dashboards
      tags:
      - grafana
    post:
      consumes:
      - application/json
      description: Create a new Grafana dashboard
      parameters:
      - description: Dashboard configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/infrastructure.GrafanaDashboard'
      produces:
      - application/json
      responses:
        "201":
          description: Dashboard created successfully
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Invalid dashboard data
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Failed to create dashboard
          schema:
            $ref: '#/definitions/response.Response'
      summary: Create Grafana dashboard
      tags:
      - grafana
  /grafana/dashboards/{uid}:
    delete:
      consumes:
      - application/json
      description: Delete a Grafana dashboard by UID
      parameters:
      - description: Dashboard UID
        in: path
        name: uid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Dashboard deleted successfully
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Dashboard UID is required
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Failed to delete dashboard
          schema:
            $ref: '#/definitions/response.Response'
      summary: Delete Grafana dashboard
      tags:
      - grafana
    get:
      consumes:
      - application/json
      description: Retrieve a Grafana dashboard by UID
      parameters:
      - description: Dashboard UID
        in: path
        name: uid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Dashboard retrieved successfully
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Dashboard UID is required
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Dashboard not found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get Grafana dashboard
      tags:
      - grafana
    put:
      consumes:
      - application/json
      description: Update an existing Grafana dashboard
      parameters:
      - description: Dashboard UID
        in: path
        name: uid
        required: true
        type: string
      - description: Dashboard configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/infrastructure.GrafanaDashboard'
      produces:
      - application/json
      responses:
        "200":
          description: Dashboard updated successfully
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Invalid dashboard data
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Failed to update dashboard
          schema:
            $ref: '#/definitions/response.Response'
      summary: Update Grafana dashboard
      tags:
      - grafana
  /grafana/datasources:
    post:
