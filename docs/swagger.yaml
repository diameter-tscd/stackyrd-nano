      summary: Create Grafana data source
      tags:
      - grafana
  /grafana/health:
    get:
      consumes:
      - application/json
      description: Check Grafana service health
      produces:
      - application/json
      responses:
        "200":
          description: Grafana health check successful
          schema:
            $ref: '#/definitions/response.Response'
        "503":
