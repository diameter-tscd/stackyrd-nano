      tags:
      - orders
  /orders/{tenant}/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an order from a specific tenant's database
      parameters:
      - description: Tenant identifier
        in: path
        name: tenant
        required: true
        type: string
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Order deleted from tenant database
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Invalid order ID
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Tenant database or order not found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Failed to delete order
          schema:
