name: Go Build

on:
  push:
    branches: [ "main", "master" ]

jobs:

  build:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.25.3"
        cache: true

    - name: Cache Go Build
      uses: actions/cache@v4
      with:
        path: ~/.cache/go-build
        key: ${{ runner.os }}-go-build-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-go-build-${{ runner.os }}

    - name: Go Module Init
      if: hashFiles('go.mod') == ''
      run: |
        go mod init
        go mod tidy
      continue-on-error: true

    - name: Tidy Modules
      if: hashFiles('go.mod') != ''
      run: go mod tidy
      continue-on-error: true

    - name: Build
      if: hashFiles('go.mod') != ''
      run: go build -v ./cmd/app/

    - name: Test
      if: hashFiles('go.mod') != ''
      run: go test -v ./...
      continue-on-error: true
